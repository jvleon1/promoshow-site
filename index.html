<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PromoShow — Ofertas Shopee</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080808;
  --surface: #111111;
  --surface2: #181818;
  --border: rgba(255,255,255,0.06);
  --text: #f0f0f0;
  --muted: rgba(255,255,255,0.38);
  --accent: #FF6B00;
  --accent2: #FF3D00;
  --glow: rgba(255,107,0,0.4);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; overflow-x:hidden; }
body::after { content:''; position:fixed; inset:0; pointer-events:none; z-index:100; opacity:0.025; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }

/* TOP BAR */
.topbar { position:sticky; top:0; z-index:50; background:rgba(8,8,8,0.92); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); padding:0 24px; height:60px; display:flex; align-items:center; justify-content:space-between; }
.logo { display:flex; align-items:center; gap:10px; }
.logo-icon { width:36px; height:36px; border-radius:10px; background:linear-gradient(135deg,var(--accent),var(--accent2)); display:flex; align-items:center; justify-content:center; font-family:'Bebas Neue',sans-serif; font-size:15px; color:white; box-shadow:0 0 16px var(--glow); flex-shrink:0; }
.logo-name { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:2px; }
.logo-sub { font-size:10px; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase; }
.topbar-right { display:flex; align-items:center; gap:12px; }
.live-pill { display:flex; align-items:center; gap:6px; background:rgba(255,107,0,0.1); border:1px solid rgba(255,107,0,0.25); padding:5px 12px; border-radius:50px; font-size:11px; font-weight:700; color:var(--accent); letter-spacing:1px; text-transform:uppercase; }
.live-dot { width:6px; height:6px; border-radius:50%; background:var(--accent); animation:blink 1.4s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.update-time { font-size:11px; color:var(--muted); }

/* LAYOUT */
.layout { display:grid; grid-template-columns: 1fr 2fr; min-height:calc(100vh - 60px); }

/* SIDEBAR */
.sidebar { border-right:1px solid var(--border); display:flex; flex-direction:column; background:var(--surface); }
.sidebar-header { padding:18px 16px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; position:sticky; top:60px; background:var(--surface); z-index:10; }
.sidebar-title { font-family:'Bebas Neue',sans-serif; font-size:14px; letter-spacing:2px; color:var(--muted); }
.count-badge { background:var(--surface2); border:1px solid var(--border); padding:3px 10px; border-radius:50px; font-size:12px; font-weight:700; color:var(--accent); }
.sidebar-list { overflow-y:auto; flex:1; padding:10px; display:flex; flex-direction:column; gap:6px; }
.sidebar-list::-webkit-scrollbar { width:3px; }
.sidebar-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

/* CARD LISTA */
.produto-card { background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:10px; display:flex; gap:10px; align-items:center; text-decoration:none; color:inherit; transition:border-color 0.2s,background 0.2s; animation:slideIn 0.3s ease forwards; opacity:0; cursor:pointer; }
.produto-card:hover { border-color:rgba(255,107,0,0.3); background:rgba(255,107,0,0.04); }
@keyframes slideIn { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
.card-img { width:52px; height:52px; border-radius:9px; object-fit:contain; background:#1a1a1a; flex-shrink:0; }
.card-info { flex:1; min-width:0; }
.card-name { font-size:11px; font-weight:600; line-height:1.3; margin-bottom:5px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.card-meta { display:flex; align-items:center; gap:5px; flex-wrap:wrap; }
.card-discount { font-size:10px; font-weight:700; padding:2px 6px; border-radius:50px; }
.card-nicho { font-size:10px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.card-time { font-size:10px; color:var(--muted); flex-shrink:0; align-self:flex-start; }

/* MAIN */
.main { padding:28px 32px; display:flex; flex-direction:column; gap:20px; }
.main-header { display:flex; align-items:center; gap:12px; }
.main-title { font-family:'Bebas Neue',sans-serif; font-size:13px; letter-spacing:3px; color:var(--muted); }
.champion-badge { display:flex; align-items:center; gap:6px; background:linear-gradient(135deg,var(--accent),var(--accent2)); padding:5px 14px; border-radius:50px; font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; box-shadow:0 4px 16px var(--glow); }

/* CAMPEÃO */
.champion-wrap { display:grid; grid-template-columns:1fr 1fr; background:var(--surface); border:1px solid var(--border); border-radius:22px; overflow:hidden; position:relative; }
.champion-wrap::before { content:''; position:absolute; top:-80px; left:-80px; width:350px; height:350px; background:radial-gradient(circle,var(--glow) 0%,transparent 70%); pointer-events:none; opacity:0.35; }
.champion-img-side { position:relative; background:linear-gradient(135deg,#111,#0d0d0d); display:flex; align-items:center; justify-content:center; padding:36px; min-height:360px; }
.champion-img { width:100%; max-width:260px; aspect-ratio:1; object-fit:contain; border-radius:14px; filter:drop-shadow(0 16px 36px rgba(0,0,0,0.7)); transition:transform 0.4s ease; }
.champion-img:hover { transform:scale(1.04); }
.discount-circle { position:absolute; top:18px; right:18px; width:68px; height:68px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--accent2)); display:flex; flex-direction:column; align-items:center; justify-content:center; box-shadow:0 6px 20px var(--glow); transform:rotate(12deg); }
.discount-num { font-family:'Bebas Neue',sans-serif; font-size:22px; line-height:1; }
.discount-off { font-size:9px; font-weight:900; letter-spacing:1px; }
.champion-info-side { padding:32px 28px 32px 8px; display:flex; flex-direction:column; justify-content:center; gap:14px; }
.champ-nicho { font-size:11px; font-weight:700; color:var(--accent); letter-spacing:3px; text-transform:uppercase; }
.champ-name { font-family:'Bebas Neue',sans-serif; font-size:32px; line-height:1.05; letter-spacing:1px; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
.champ-stars { display:flex; align-items:center; gap:8px; }
.stars-row { display:flex; gap:2px; }
.star { width:15px; height:15px; }
.rating-val { font-size:13px; font-weight:700; color:#FFB800; }
.sales-val { font-size:12px; color:var(--muted); }
.divider { width:100%; height:1px; background:linear-gradient(90deg,transparent,var(--accent),transparent); opacity:0.25; }
.price-label { font-size:11px; color:var(--muted); margin-bottom:4px; }
.champ-price-row { display:flex; align-items:flex-end; gap:8px; }
.price-current { font-family:'Bebas Neue',sans-serif; font-size:40px; color:var(--accent); line-height:1; }
.price-orig { font-size:13px; color:var(--muted); text-decoration:line-through; padding-bottom:5px; }
.economy-tag { font-size:11px; font-weight:700; color:#4ade80; background:rgba(74,222,128,0.1); padding:3px 9px; border-radius:50px; margin-left:auto; align-self:center; }
.cta-btn { display:flex; align-items:center; justify-content:center; gap:8px; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:white; text-decoration:none; padding:15px 20px; border-radius:12px; font-weight:700; font-size:14px; letter-spacing:1.5px; text-transform:uppercase; box-shadow:0 8px 24px var(--glow); transition:transform 0.15s,box-shadow 0.15s; }
.cta-btn:hover { transform:translateY(-2px); box-shadow:0 12px 32px var(--glow); }
.urgency-row { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted); }
.urgency-row span { color:var(--accent); font-weight:700; }

/* EMPTY/LOADING */
.empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; gap:10px; color:var(--muted); text-align:center; }
.empty-state h3 { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:2px; color:rgba(255,255,255,0.15); }
.spinner { width:28px; height:28px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }

/* MOBILE */
@media(max-width:860px) {
  .layout { grid-template-columns:1fr; }
  .sidebar { border-right:none; border-bottom:1px solid var(--border); max-height:240px; }
  .sidebar-list { flex-direction:row; overflow-x:auto; overflow-y:hidden; flex-wrap:nowrap; }
  .produto-card { min-width:180px; flex-direction:column; align-items:flex-start; }
  .champion-wrap { grid-template-columns:1fr; }
  .champion-img-side { min-height:220px; padding:20px; }
  .champion-info-side { padding:20px; }
  .main { padding:16px; }
}
</style>
</head>
<body>

<header class="topbar">
  <div class="logo">
    <div class="logo-icon">PS</div>
    <div>
      <div class="logo-name">PromoShow</div>
      <div class="logo-sub">Ofertas Shopee</div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="live-pill"><div class="live-dot"></div>Ao vivo</div>
    <span class="update-time" id="updateTime">Carregando...</span>
  </div>
</header>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Postados Hoje</span>
      <span class="count-badge" id="countBadge">0</span>
    </div>
    <div class="sidebar-list" id="sidebarList">
      <div class="empty-state"><div class="spinner"></div></div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="main-header">
      <span class="main-title">Destaque do Momento</span>
      <div class="champion-badge">🏆 Produto Campeão</div>
    </div>
    <div id="championWrap">
      <div class="empty-state"><div class="spinner"></div></div>
    </div>
  </main>

</div>

<script>
const TEMAS = {
  'Tech_e_Gadgets':  {primary:'#6C63FF',glow:'rgba(108,99,255,0.4)',label:'📱 Tech & Gadgets'},
  'Cozinha':         {primary:'#F4A261',glow:'rgba(244,162,97,0.4)', label:'🍳 Casa & Cozinha'},
  'Casa':            {primary:'#74B9FF',glow:'rgba(116,185,255,0.4)',label:'🏠 Casa & Decoração'},
  'Beleza_e_Estilo': {primary:'#E91E8C',glow:'rgba(233,30,140,0.4)', label:'💄 Beleza & Estilo'},
  'Ferramentas':     {primary:'#FF6B00',glow:'rgba(255,107,0,0.4)',  label:'🔧 Ferramentas'},
  'geral':           {primary:'#FF6B00',glow:'rgba(255,107,0,0.4)',  label:'🛍️ Oferta Exclusiva'}
};

function getTema(n){ return TEMAS[n]||TEMAS['geral']; }

function renderStars(r){
  const f=Math.round(parseFloat(r)||0);
  return Array.from({length:5},(_,i)=>`<svg class="star" viewBox="0 0 24 24" fill="${i<f?'#FFB800':'rgba(255,255,255,0.12)'}"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>`).join('');
}

function timeAgo(ts){
  if(!ts) return '';
  let unix;
  if(String(ts).includes('T') || String(ts).includes('-')){
    unix = Math.floor(new Date(ts).getTime()/1000);
  } else {
    unix = parseInt(ts);
  }
  const d = Math.floor(Date.now()/1000) - unix;
  if(d<60) return 'agora';
  if(d<3600) return `${Math.floor(d/60)}min`;
  return `${Math.floor(d/3600)}h`;
}

function fmtPrice(p){
  return p>0?'R$ '+parseFloat(p).toFixed(2).replace('.',','):'';
}

async function carregaCampeao(){
  try{
    const res=await fetch('https://raw.githubusercontent.com/jvleon1/promoshow-site/main/produto.json?v='+Date.now());
    if(!res.ok) throw 0;
    const p=await res.json();
    // Normaliza campos independente do nome
    p.productNameClean = p.productNameClean || p.nome || p.title || p.name || '';
    p.priceDiscountRate = p.priceDiscountRate || p.desconto || 0;
    p.imageUrl = p.imageUrl || p.imagem || p.image || '';
    p.offerLink = p.offerLink || p.link || p.url || '#';
    p.ratingStar = p.ratingStar || p.rating || 0;
    p.sales = p.sales || p.vendas || 0;

    if(!p || !p.productNameClean || p.productNameClean.includes('Aguardando')){
      document.getElementById('championWrap').innerHTML=`<div class="empty-state"><h3>Nenhum campeão ainda</h3><p>Aguarde o próximo horário</p></div>`;
      return;
    }
    const t=getTema(p.nicho);
    const disc=parseFloat(p.priceDiscountRate)||0;
    const rat=parseFloat(p.ratingStar)||0;
    const pr=parseFloat(p.price)||0;
    const prOrig=pr>0?pr/(1-disc/100):0;
    document.documentElement.style.setProperty('--accent',t.primary);
    document.documentElement.style.setProperty('--accent2',t.primary);
    document.documentElement.style.setProperty('--glow',t.glow);
    let urg='⚡ Oferta válida por <span>tempo limitado!</span>';
    if(disc>=70) urg='🚨 Desconto <span>ABSURDO!</span> Corre antes de esgotar!';
    else if(disc>=50) urg='⚡ Oferta <span>imperdível!</span> Aproveite agora!';
    document.getElementById('championWrap').innerHTML=`
      <div class="champion-wrap">
        <div class="champion-img-side">
          <img class="champion-img" src="${p.imageUrl}" alt="${p.productNameClean}" onerror="this.style.opacity=0.2">
          <div class="discount-circle"><div class="discount-num">${disc}%</div><div class="discount-off">OFF</div></div>
        </div>
        <div class="champion-info-side">
          <div class="champ-nicho">${t.label}</div>
          <div class="champ-name">${p.productNameClean.toUpperCase()}</div>
          <div class="champ-stars">
            <div class="stars-row">${renderStars(rat)}</div>
            <span class="rating-val">${rat.toFixed(1)}</span>
            <span class="sales-val">• ${p.sales||0}+ vendidos</span>
          </div>
          <div class="divider"></div>
          <div>
            <div class="price-label">Preço com desconto</div>
            <div class="champ-price-row">
              <div class="price-current">${pr>0?fmtPrice(pr):'Ver preço'}</div>
              ${prOrig>0?`<div class="price-orig">${fmtPrice(prOrig)}</div>`:''}
              ${disc>0?`<div class="economy-tag">-${disc}%</div>`:''}
            </div>
          </div>
          <a class="cta-btn" href="${p.offerLink||'#'}" target="_blank" rel="noopener">🛒 Comprar na Shopee</a>
          <div class="urgency-row">${urg}</div>
        </div>
      </div>`;
    if(p.timestamp) document.getElementById('updateTime').textContent='Atualizado '+timeAgo(p.timestamp);
  }catch(e){
    document.getElementById('championWrap').innerHTML=`<div class="empty-state"><h3>Sem produto em destaque</h3></div>`;
  }
}

async function carregaLista(){
  try{
    const res=await fetch('https://raw.githubusercontent.com/jvleon1/promoshow-site/main/produtos_hoje.json?v='+Date.now());
    if(!res.ok) throw 0;
    const lista=await res.json();
    const el=document.getElementById('sidebarList');
    document.getElementById('countBadge').textContent=lista.length;
    if(!lista||lista.length===0){
      el.innerHTML=`<div class="empty-state"><h3>Nenhum produto hoje</h3></div>`;
      return;
    }
    lista.sort((a,b)=>(b.timestamp||0)-(a.timestamp||0));
    el.innerHTML=lista.map((p,i)=>{
      const t=getTema(p.nicho);
      return `<a class="produto-card" href="${p.offerLink||'#'}" target="_blank" rel="noopener" style="animation-delay:${i*35}ms">
        <img class="card-img" src="${p.imageUrl}" alt="${p.productNameClean}" onerror="this.style.opacity=0.2">
        <div class="card-info">
          <div class="card-name">${p.productNameClean}</div>
          <div class="card-meta">
            <span class="card-discount" style="color:${t.primary};background:${t.glow.replace('0.4','0.1')}">${p.priceDiscountRate}% OFF</span>
            <span class="card-nicho">${t.label}</span>
          </div>
        </div>
        <div class="card-time">${timeAgo(p.timestamp)}</div>
      </a>`;
    }).join('');
  }catch(e){
    document.getElementById('sidebarList').innerHTML=`<div class="empty-state"><h3>Sem produtos hoje</h3></div>`;
    document.getElementById('countBadge').textContent='0';
  }
}

async function init(){ await Promise.all([carregaCampeao(),carregaLista()]); }
init();
setInterval(init, 2*60*1000);
</script>
</body>
</html>
